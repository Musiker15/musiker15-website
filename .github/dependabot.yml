version: 2

updates:
  # ── npm (Next.js app) ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    # Group all non-breaking updates into a single PR to reduce noise
    groups:
      dependencies:
        update-types:
          - "minor"
          - "patch"
    # Block major version bumps for packages with known breaking changes:
    # - eslint v10+: not supported by eslint-config-next@15.x
    # - eslint-config-next: must stay in sync with installed Next.js version
    # - next: major upgrades require manual migration (App Router changes)
    # - tailwindcss: v4 is a complete rewrite (no tailwind.config.js, CSS-based config)
    # - typescript: major compiler changes require manual verification
    # - lucide-react: v1.x API changes from 0.x need manual review
    # - @types/node: major bumps should stay in sync with Node.js runtime version
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    # Security updates always get their own PR regardless of grouping
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
